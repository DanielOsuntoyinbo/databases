---
# roles/monitoring/handlers/main.yml

- name: restart prometheus
  systemd:
    name: prometheus
    state: restarted
  become: yes

- name: restart alertmanager
  systemd:
    name: alertmanager
    state: restarted
  become: yes

- name: restart node_exporter
  systemd:
    name: node_exporter
    state: restarted
  become: yes

- name: restart postgres_exporter
  systemd:
    name: postgres_exporter
    state: restarted
  become: yes

- name: restart grafana
  systemd:
    name: grafana-server
    state: restarted
  become: yes

- name: reload prometheus
  systemd:
    name: prometheus
    state: reloaded
  become: yes
