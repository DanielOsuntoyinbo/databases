---
# roles/common/tasks/main.yml
# Base OS configuration applied to every node before any service is installed.
# Mirrors what enterprise teams do as a baseline on every new VM.

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Install base packages
  apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - vim
      - htop
      - net-tools
      - dnsutils
      - python3
      - python3-pip
      - acl           # required for Ansible become + unprivileged users
      - ntp           # time sync — critical for Patroni/etcd consensus
    state: present
  become: yes

- name: Ensure NTP is running
  service:
    name: ntp
    state: started
    enabled: yes
  become: yes

- name: Set timezone to UTC
  timezone:
    name: UTC
  become: yes

- name: Set hostname to inventory hostname
  hostname:
    name: "{{ inventory_hostname }}"
  become: yes

- name: Disable password authentication in sshd
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  become: yes
  notify: restart sshd

- name: Set vm.swappiness to 1 (recommended for PostgreSQL)
  sysctl:
    name: vm.swappiness
    value: "1"
    state: present
    sysctl_set: yes
    reload: yes
  become: yes

- name: Set vm.overcommit_memory to 2 (recommended for PostgreSQL)
  sysctl:
    name: vm.overcommit_memory
    value: "2"
    state: present
    sysctl_set: yes
    reload: yes
  become: yes

- name: Increase max open files limit for postgres
  pam_limits:
    domain: postgres
    limit_type: "{{ item.type }}"
    limit_item: nofile
    value: "65536"
  loop:
    - { type: soft }
    - { type: hard }
  become: yes
