---
# roles/postgres/tasks/main.yml
# Installs and configures PostgreSQL 15.14 from the official PGDG apt repo.

- name: Install required packages for PGDG repo setup
  apt:
    name:
      - curl
      - ca-certificates
      - gnupg
    state: present
  become: yes

- name: Create PGDG keyring directory
  file:
    path: /usr/share/postgresql-common/pgdg
    state: directory
    mode: "0755"
  become: yes

- name: Download PGDG apt signing key
  get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
    mode: "0644"
  become: yes

- name: Add PGDG apt repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg
  become: yes

- name: Update apt cache after adding PGDG repo
  apt:
    update_cache: yes
  become: yes

- name: Install PostgreSQL {{ postgresql_version }}
  apt:
    name: 
      - "postgresql-{{ postgresql_version }}={{ postgresql_package_version }}-1.pgdg22.04+1"
      - "postgresql-client-{{ postgresql_version }}={{ postgresql_package_version }}-1.pgdg22.04+1"
    state: present
    allow_downgrade: yes
  become: yes

- name: Install PostgreSQL contrib package
  apt:
    name: "postgresql-contrib-{{ postgresql_version }}"
    state: present
  become: yes

- name: Ensure PostgreSQL service is stopped
  service:
    name: "postgresql@{{ postgresql_version }}-main"
    state: stopped
    enabled: no
  become: yes

- name: Deploy postgresql.conf
  template:
    src: postgresql.conf.j2
    dest: "{{ postgresql_config_dir }}/postgresql.conf"
    owner: postgres
    group: postgres
    mode: "0644"
  become: yes

- name: Deploy pg_hba.conf
  template:
    src: pg_hba.conf.j2
    dest: "{{ postgresql_config_dir }}/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  become: yes

- name: Ensure PostgreSQL log directory exists
  file:
    path: "{{ postgresql_log_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0755"
  become: yes

- name: Create pgbouncer schema and auth function
  become: yes
  become_user: postgres
  postgresql_query:
    query: |
      CREATE SCHEMA IF NOT EXISTS pgbouncer;
      CREATE OR REPLACE FUNCTION pgbouncer.get_auth(p_usename TEXT)
      RETURNS TABLE(usename TEXT, passwd TEXT)
      LANGUAGE sql SECURITY DEFINER SET search_path = pg_catalog
      AS $$
        SELECT usename::TEXT, passwd::TEXT
        FROM pg_shadow WHERE usename = p_usename;
      $$;
      CREATE USER IF NOT EXISTS pgbouncer_auth WITH PASSWORD '{{ pgbouncer_auth_password }}' NOSUPERUSER NOCREATEDB NOCREATEROLE;
      CREATE USER IF NOT EXISTS pgbouncer_admin WITH PASSWORD '{{ pgbouncer_admin_password }}' NOSUPERUSER NOCREATEDB NOCREATEROLE;
      GRANT USAGE ON SCHEMA pgbouncer TO pgbouncer_auth;
      GRANT EXECUTE ON FUNCTION pgbouncer.get_auth(TEXT) TO pgbouncer_auth;
  run_once: true
  when: patroni_role == 'primary'
